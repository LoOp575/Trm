name: Import free-claude-code

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  import:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout target repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Replace target contents with source repository
        shell: bash
        run: |
          set -euo pipefail
          tmp_dir="$(mktemp -d)"
          git clone --depth=1 https://github.com/Alishahryar1/free-claude-code.git "$tmp_dir/source"
          rm -rf "$tmp_dir/source/.git"
          find . -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          cp -a "$tmp_dir/source/." .
          git status --short

      - name: Commit and push imported source
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Replace Trm with free-claude-code"
            git push origin HEAD:main
          fi
